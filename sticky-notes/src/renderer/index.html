<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Sticky Note</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-yellow">
  <header class="titlebar" id="titlebar">
    <button class="tb-btn" id="addBtn" title="New note">+</button>
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="menuBtn" title="Menu">&#8943;</button>
    <button class="tb-btn" id="closeBtn" title="Close">&#10005;</button>
  </header>

  <div class="menu-panel" id="menuPanel" hidden>
    <div class="colors" id="colorRow"></div>
    <button class="menu-item danger" id="deleteBtn">Delete note</button>
  </div>

  <div class="editor" id="editor" contenteditable="true" spellcheck="false"></div>

  <footer class="toolbar" id="toolbar">
    <button class="fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
    <button class="fmt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
    <button class="fmt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
    <button class="fmt-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
    <button class="fmt-btn" data-cmd="insertUnorderedList" title="Bullet list">&#8226;</button>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
