<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Sticky Notes</title>
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="list-titlebar" id="titlebar">
    <span class="list-title">EggTools</span>
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="minWin" title="Minimize">&#8211;</button>
    <button class="tb-btn" id="closeWin" title="Close">&#10005;</button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="notes">Notes</button>
    <button class="tab" data-tab="todos">Daily Todos</button>
  </nav>

  <!-- Notes tab -->
  <section class="tab-panel active" id="panel-notes">
    <div class="row">
      <input type="text" id="noteSearch" placeholder="Search notes..." />
      <button class="primary" id="newNoteBtn" title="New note">+</button>
    </div>
    <div class="scroll" id="noteList"></div>
    <div class="empty" id="noteEmpty" hidden>No notes yet.</div>
  </section>

  <!-- Todos tab -->
  <section class="tab-panel" id="panel-todos" hidden>
    <div class="date-bar">
      <button class="nav" id="prevDay" title="Previous day">&#8249;</button>
      <span id="dateLabel"></span>
      <button class="nav" id="nextDay" title="Next day">&#8250;</button>
      <button class="today-btn" id="todayBtn">Today</button>
      <button class="today-btn" id="summaryBtn" title="Year / month summary">汇总</button>
    </div>

    <div class="row search-row" id="todoSearchRow">
      <input type="text" id="todoSearch" placeholder="Search all todos..." />
      <select id="searchMode">
        <option value="exact">精确</option>
        <option value="fuzzy">模糊</option>
      </select>
    </div>

    <div class="row" id="todoAddRow">
      <input type="text" id="todoInput" placeholder="Add a to-do... (Enter)" />
      <button class="primary" id="addTodoBtn">+</button>
    </div>

    <div class="scroll" id="todoList"></div>
    <div class="scroll" id="summaryView" hidden></div>
    <div class="empty" id="todoEmpty" hidden>No to-dos for this day.</div>
  </section>

  <script src="list.js"></script>
</body>
</html>
